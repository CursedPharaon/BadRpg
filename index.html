    <style>
        :root {
            --gold: #c9a432;
            --text: #d4c5a0;
            --border: #5a4a2a;
            --parchment: #e8d5a0;
            --red: #8b2020;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
            touch-action: manipulation;
            -webkit-overflow-scrolling: none;
            background: #0d0d08;
        }

        body {
            font-family: 'Times New Roman', 'Georgia', serif;
            color: var(--text);
            display: flex;
            flex-direction: column;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .top-bar {
            background: linear-gradient(180deg, #1a1008 0%, #0d0804 100%);
            padding: 4px 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 2px solid #4a3a1a;
            font-size: 10px;
            letter-spacing: 0.5px;
            z-index: 200;
            flex-shrink: 0;
            flex-wrap: wrap;
            min-height: 32px;
        }
        .top-bar .stat {
            display: flex;
            align-items: center;
            gap: 3px;
            font-weight: bold;
            font-size: 9px;
        }
        .top-bar .stat .icon { font-size: 12px; }
        .top-bar .stat .value { color: var(--gold); font-size: 11px; }
        .hp-bar-mini {
            width: 65px; height: 6px;
            background: #2a0a0a;
            border: 1px solid #6a3a3a;
            border-radius: 2px;
            overflow: hidden;
        }
        .hp-bar-mini .fill {
            height: 100%;
            background: linear-gradient(180deg, #d04040, #8b2020);
            transition: width 0.4s;
        }
        .exp-bar-mini {
            width: 55px; height: 5px;
            background: #1a2a0a;
            border: 1px solid #4a6a2a;
            border-radius: 2px;
            overflow: hidden;
        }
        .exp-bar-mini .fill {
            height: 100%;
            background: linear-gradient(180deg, #80d040, #4a8b20);
            transition: width 0.4s;
        }
        .location-indicator {
            margin-left: auto;
            font-size: 9px;
            color: #c0a060;
            white-space: nowrap;
        }
        .save-dot {
            width: 8px; height: 8px;
            background: #5a8a3a;
            border-radius: 50%;
            animation: saveBlink 0.6s;
        }
        @keyframes saveBlink {
            0%,100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        .world-scroll {
            flex: 1;
            overflow: auto;
            -webkit-overflow-scrolling: touch;
            position: relative;
            background: #1a1a0a;
        }
        .game-world {
            width: 900px;
            height: 650px;
            position: relative;
            background: #3a4a2a;
            cursor: grab;
            min-width: 900px;
            min-height: 650px;
        }
        .game-world:active { cursor: grabbing; }
        .game-world.night {
            background: #1a2a1a;
            filter: brightness(0.5) saturate(0.6);
        }
        .game-world::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60"><circle cx="30" cy="30" r="1.5" fill="%235a6a3a" opacity="0.4"/><circle cx="15" cy="45" r="1" fill="%234a5a2a" opacity="0.3"/><circle cx="48" cy="18" r="1.2" fill="%236a7a4a" opacity="0.35"/></svg>');
            pointer-events: none;
            z-index: 0;
        }

        .location-label {
            position: absolute;
            font-size: 11px;
            color: #e0d8b0;
            text-shadow: 1px 1px 2px #000;
            pointer-events: none;
            z-index: 5;
            font-weight: bold;
            white-space: nowrap;
        }
        .teleport-point {
            position: absolute;
            width: 32px; height: 32px;
            background: radial-gradient(circle, #8090ff 0%, #3040a0 70%, transparent 70%);
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            animation: teleportGlow 2s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
            color: white;
            text-shadow: 0 0 3px #000;
            font-weight: bold;
        }
        @keyframes teleportGlow {
            0%,100% { box-shadow: 0 0 8px #6080ff; }
            50% { box-shadow: 0 0 18px #80a0ff; }
        }

        .mob {
            position: absolute;
            width: 26px; height: 26px;
            background: radial-gradient(circle, #e0c040 0%, #b09020 60%, #705000 100%);
            border-radius: 50%;
            cursor: pointer;
            z-index: 15;
            transition: left 1.5s linear, top 1.5s linear;
            box-shadow: 0 0 10px rgba(200,160,40,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 7px;
            color: #3a2a00;
            font-weight: bold;
        }
        .mob.selected {
            outline: 3px dashed #ffcc00;
            outline-offset: 4px;
            animation: outlineDash 0.8s linear infinite;
            z-index: 20;
        }
        @keyframes outlineDash {
            0% { outline-offset: 3px; }
            50% { outline-offset: 8px; }
            100% { outline-offset: 3px; }
        }
        .mob.cave-mob { background: radial-gradient(circle, #909090 0%, #505050 60%, #202020 100%); }
        .mob.dungeon-mob { background: radial-gradient(circle, #c04040 0%, #801010 60%, #400000 100%); }
        .mob.field-mob { background: radial-gradient(circle, #c0a040 0%, #806010 60%, #402000 100%); }
        .mob-ellad { background: radial-gradient(circle, #e0e0ff 0%, #8080c0 60%, #303060 100%); }

        .target-panel {
            position: fixed;
            right: 8px; top: 50px;
            background: rgba(10,5,0,0.94);
            border: 2px solid #5a4a2a;
            padding: 10px;
            font-size: 10px;
            z-index: 250;
            min-width: 140px;
            display: none;
            color: #d4c5a0;
        }
        .target-panel.visible { display: block; }
        .target-panel .mob-name { font-size: 12px; color: #e0c040; font-weight: bold; }
        .target-panel button {
            display: block; width: 100%;
            margin-top: 4px; padding: 5px;
            border: 1px solid #5a4a2a;
            background: #2a1a08;
            color: #d4c5a0;
            cursor: pointer;
            font-family: inherit;
            font-size: 10px;
        }
        .target-panel .attack-btn {
            background: #4a1010;
            color: #ffaaaa;
            border-color: #8b2020;
        }

        .inventory-overlay {
            position: fixed;
            left: 5px; top: 38px;
            width: 250px;
            max-height: 70%;
            background: rgba(15,10,2,0.96);
            border: 3px solid #5a4a2a;
            z-index: 300;
            display: none;
            flex-direction: column;
            padding: 8px;
            font-size: 10px;
            overflow-y: auto;
            color: #c0b090;
        }
        .inventory-overlay.visible { display: flex; }
        .inventory-overlay h3 {
            text-align: center;
            color: var(--gold);
            border-bottom: 1px solid #4a3a1a;
            padding-bottom: 6px;
            margin-bottom: 6px;
            font-size: 13px;
        }
        .inv-item {
            padding: 4px 6px;
            border-bottom: 1px solid #2a1a08;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            font-size: 10px;
        }
        .inv-item.equipped {
            color: #80ff80;
            border-left: 3px solid #4a8b20;
        }
        .char-preview {
            text-align: center;
            padding: 8px;
            border-bottom: 2px solid #4a3a1a;
            margin-bottom: 8px;
        }
        .char-preview img { width: 60px; height: auto; }

        .shop-overlay {
            position: fixed;
            inset: 35px 10px 10px 10px;
            background: rgba(20,12,4,0.97);
            border: 4px solid #6a5a3a;
            z-index: 310;
            display: none;
            flex-direction: column;
            padding: 15px;
            overflow-y: auto;
            font-size: 11px;
        }
        .shop-overlay.visible { display: flex; }
        .shop-overlay .shop-bg {
            background: var(--parchment);
            color: #2a1a08;
            padding: 12px;
            flex: 1;
            overflow-y: auto;
        }
        .shop-tabs { display: flex; gap: 3px; margin-bottom: 10px; }
        .shop-tabs button {
            padding: 6px 12px;
            background: #3a2a0a;
            border: 1px solid #6a5a2a;
            color: #c0a060;
            cursor: pointer;
            font-family: inherit;
            font-size: 11px;
        }
        .shop-tabs button.active {
            background: #6a4a10;
            color: #fff;
            border-color: #c9a432;
        }
        .shop-close {
            position: absolute;
            right: 10px; top: 10px;
            width: 26px; height: 26px;
            background: #6a2020;
            color: #ffaaaa;
            border: 1px solid #8b2020;
            cursor: pointer;
            font-size: 14px;
            z-index: 5;
            text-align: center;
            line-height: 24px;
        }
        .shop-cards { display: flex; flex-wrap: wrap; gap: 8px; }
        .shop-card {
            width: 120px;
            background: #f5ead0;
            border: 2px solid #8a7a4a;
            padding: 8px;
            text-align: center;
            font-size: 10px;
            color: #1a1008;
        }
        .shop-card .card-name { font-weight: bold; font-size: 11px; color: #3a2010; }
        .shop-card .card-desc { font-size: 9px; color: #5a4a3a; }
        .shop-card .card-price { color: #8b5010; font-weight: bold; }
        .shop-card .buy-btn {
            background: #8b2020;
            color: #ffdddd;
            border: 1px solid #5a1010;
            padding: 4px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            font-size: 10px;
            width: 100%;
            margin-top: 4px;
        }

        .promo-overlay {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(10,5,0,0.97);
            border: 3px solid #c9a432;
            padding: 20px;
            z-index: 350;
            display: none;
            flex-direction: column;
            gap: 10px;
            text-align: center;
            min-width: 250px;
        }
        .promo-overlay.visible { display: flex; }
        .promo-overlay h3 { color: var(--gold); font-size: 14px; }
        .promo-overlay input {
            padding: 8px;
            background: #1a1a0a;
            border: 1px solid #5a4a2a;
            color: var(--gold);
            font-family: inherit;
            font-size: 14px;
            text-align: center;
            letter-spacing: 2px;
        }
        .promo-overlay button {
            padding: 8px;
            background: #4a3a1a;
            border: 1px solid #c9a432;
            color: var(--gold);
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
        }
        .promo-close {
            position: absolute;
            right: 8px; top: 8px;
            background: none;
            border: none;
            color: #8a7a5a;
            cursor: pointer;
            font-size: 16px;
        }

        .ui-btn {
            position: fixed;
            right: 6px;
            width: 34px; height: 34px;
            background: #3a3a2a;
            border: 2px solid #6a5a2a;
            color: #c0b080;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            z-index: 290;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #btn-inventory { top: 42px; }
        #btn-shop { top: 80px; }
        #btn-save { top: 118px; font-size: 12px; background: #2a3a1a; border-color: #4a6a2a; }
        #btn-promo { top: 156px; font-size: 12px; background: #3a2a0a; border-color: #c9a432; color: #c9a432; }
        #btn-quests { top: 194px; font-size: 12px; background: #2a1a3a; border-color: #6a4a8a; color: #c0a0e0; }
        #btn-bio { top: 232px; font-size: 12px; background: #1a2a3a; border-color: #4a6a8a; color: #a0c0e0; }

        .floating-msg {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.92);
            color: #e0c040;
            padding: 10px 20px;
            border: 2px solid #6a5a2a;
            z-index: 400;
            font-family: inherit;
            font-size: 13px;
            pointer-events: none;
            animation: fadeUp 2s forwards;
        }
        @keyframes fadeUp {
            0% { opacity: 1; transform: translate(-50%, -50%); }
            80% { opacity: 0.8; transform: translate(-50%, -70%); }
            100% { opacity: 0; transform: translate(-50%, -100%); }
        }
        .damage-num {
            position: absolute;
            color: #ff4444;
            font-weight: bold;
            font-size: 12px;
            pointer-events: none;
            z-index: 40;
            animation: dmgFloat 1.2s forwards;
        }
        @keyframes dmgFloat {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-35px); }
        }
        .heal-num {
            color: #44ff44;
            position: absolute;
            font-weight: bold;
            font-size: 12px;
            pointer-events: none;
            z-index: 40;
            animation: dmgFloat 1.2s forwards;
        }
        .gold-num {
            color: #ffdd44;
            position: absolute;
            font-weight: bold;
            font-size: 12px;
            pointer-events: none;
            z-index: 40;
            animation: dmgFloat 1.2s forwards;
        }

        .swipe-hint {
            position: fixed;
            bottom: 6px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: #8a7a5a;
            font-size: 9px;
            padding: 3px 10px;
            border-radius: 8px;
            z-index: 100;
            pointer-events: none;
        }

        /* hidden objects */
        .hidden-object {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 12;
            animation: hiddenPulse 2s infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        @keyframes hiddenPulse {
            0%,100% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.3); opacity: 1; }
        }

        /* NPC */
        .npc {
            position: absolute;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: radial-gradient(circle, #80c0ff 0%, #3060a0 60%, #103060 100%);
            border: 2px solid #80c0ff;
            cursor: pointer;
            z-index: 14;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            box-shadow: 0 0 15px rgba(100,150,255,0.3);
            animation: npcGlow 2s infinite;
        }
        @keyframes npcGlow {
            0%,100% { box-shadow: 0 0 10px rgba(100,150,255,0.3); }
            50% { box-shadow: 0 0 25px rgba(100,150,255,0.7); }
        }
        .npc.alchemist { background: radial-gradient(circle, #80ff80 0%, #208020 60%, #004000 100%); border-color: #80ff80; }
        .npc.blacksmith { background: radial-gradient(circle, #ffa080 0%, #a04020 60%, #602000 100%); border-color: #ffa080; }
        .npc.elder { background: radial-gradient(circle, #c0c0ff 0%, #6060a0 60%, #202060 100%); border-color: #c0c0ff; }
        .npc.lady { background: radial-gradient(circle, #ff80c0 0%, #a04060 60%, #602040 100%); border-color: #ff80c0; }
        .npc.ghost { background: radial-gradient(circle, #80ffff 0%, #2080a0 60%, #004060 100%); border-color: #80ffff; animation: ghostFlicker 1s infinite; }
        @keyframes ghostFlicker {
            0%,100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .quest-diary {
            position: fixed;
            inset: 30px 10px 10px 10px;
            background: rgba(15,10,2,0.97);
            border: 3px solid #6a4a8a;
            z-index: 310;
            display: none;
            flex-direction: column;
            padding: 15px;
            overflow-y: auto;
            font-size: 11px;
            color: #d4c5a0;
        }
        .quest-diary.visible { display: flex; }
        .quest-diary h3 { color: #c0a0e0; border-bottom: 1px solid #4a3a5a; padding-bottom: 8px; margin-bottom: 10px; }
        .quest-item { padding: 6px 0; border-bottom: 1px solid #2a1a3a; }
        .quest-item .qname { color: #c0a0e0; font-weight: bold; }
        .quest-item .qstatus { color: #80a080; font-size: 9px; }
        .quest-item .qprogress { color: #a0c0a0; font-size: 9px; }
        .quest-completed { color: #80ff80; }

        .bio-overlay {
            position: fixed;
            inset: 30px 10px 10px 10px;
            background: rgba(15,10,2,0.97);
            border: 3px solid #4a6a8a;
            z-index: 310;
            display: none;
            flex-direction: column;
            padding: 15px;
            overflow-y: auto;
            font-size: 11px;
            color: #d4c5a0;
        }
        .bio-overlay.visible { display: flex; }
        .bio-overlay h3 { color: #a0c0e0; border-bottom: 1px solid #3a4a5a; padding-bottom: 8px; margin-bottom: 10px; }
        .bio-stat { padding: 4px 0; border-bottom: 1px solid #1a2a3a; }

        @media (max-width: 500px) {
            .top-bar { font-size: 8px; gap: 3px; padding: 2px 4px; min-height: 26px; }
            .hp-bar-mini { width: 45px; height: 5px; }
            .exp-bar-mini { width: 40px; height: 4px; }
            .inventory-overlay { width: 200px; left: 2px; top: 30px; max-height: 60%; font-size: 9px; }
            .shop-card { width: 90px; font-size: 8px; }
            .ui-btn { width: 28px; height: 28px; font-size: 12px; right: 3px; }
            #btn-inventory { top: 34px; }
            #btn-shop { top: 66px; }
            #btn-save { top: 98px; }
            #btn-promo { top: 130px; }
            #btn-quests { top: 162px; }
            #btn-bio { top: 194px; }
            .target-panel { right: 2px; top: 40px; min-width: 120px; font-size: 9px; }
        }
    </style>
</head>
<body>
    <div class="top-bar" id="top-bar">
        <div class="stat"><span class="icon">👤</span> Ур: <span class="value" id="stat-level">1</span></div>
        <div class="stat">❤️<div class="hp-bar-mini"><div class="fill" id="hp-fill" style="width:100%"></div></div><span class="value" id="stat-hp">100/100</span></div>
        <div class="stat">⭐<div class="exp-bar-mini"><div class="fill" id="exp-fill" style="width:0%"></div></div><span class="value" id="stat-exp">0/400</span></div>
        <div class="stat"><span class="icon">💰</span> <span class="value" id="stat-gold">10000</span></div>
        <div class="stat"><span class="icon">⚔️</span> <span class="value" id="stat-dmg">4</span></div>
        <span class="location-indicator" id="location-indicator">🏰 Начальный Город</span>
        <span id="save-dot-container"></span>
    </div>

    <div class="world-scroll" id="world-scroll">
        <div class="game-world" id="game-world"></div>
    </div>

    <div class="swipe-hint">↔ Свайпайте для перемещения по карте</div>

    <button class="ui-btn" id="btn-inventory" title="Инвентарь">I</button>
    <button class="ui-btn" id="btn-shop" title="Магазин">S</button>
    <button class="ui-btn" id="btn-save" title="Сохранить">💾</button>
    <button class="ui-btn" id="btn-promo" title="Промокод">C</button>
    <button class="ui-btn" id="btn-quests" title="Дневник квестов">Q</button>
    <button class="ui-btn" id="btn-bio" title="Биография">B</button>

    <div class="inventory-overlay" id="inventory-overlay">
        <div class="char-preview">
            <img src="https://i.ibb.co/QFh4d18z/84-20260619235002.png" alt="Персонаж">
            <div style="color:#c0a060;margin-top:3px;font-size:11px;">Октавиус</div>
        </div>
        <h3>🎒 ИНВЕНТАРЬ</h3>
        <div style="border-bottom:1px solid #3a2a0a;padding-bottom:4px;margin-bottom:4px;">
            <div style="color:#8a7a4a;font-size:9px;">ЭКИПИРОВКА:</div>
            <div id="equip-weapon" style="font-size:10px;">Оружие: нет</div>

                    x: Math.round(x),
                    y: Math.round(y),
                    label: def.label,
                    mobType: def.mobType || null,

            document.getElementById('stat-gold').textContent = gameState.gold.toLocaleString();
            document.getElementById('stat-dmg').textContent = gameState.damage;
            document.getElementById('hp-fill').style.width = (gameState.hp / gameState.maxHp * 100) + '%';
            document.getElementById('exp-fill').style.width = (gameState.exp / gameState.expToLevel * 100) + '%';
            document.getElementById('location-indicator').textContent = locations[gameState.location]?.label || '';
            
            // Проверка достижений и титулов
            checkAchievements();
            checkTitles();
        }

        function recalcStats() {
            let baseHp = 100 + (gameState.level - 1) * 30;
            if (gameState.equipment.armor) {
                if (gameState.equipment.armor.percent) baseHp = Math.floor(baseHp * (1 + gameState.equipment.armor.value / 100));
                else baseHp += gameState.equipment.armor.value;
            }
            gameState.maxHp = baseHp;
            if (gameState.hp > gameState.maxHp) gameState.hp = gameState.maxHp;
            let baseDmg = 4 + (gameState.level - 1) * 3;
            if (gameState.equipment.weapon) baseDmg += gameState.equipment.weapon.value;
            if (gameState.equipment.armor && gameState.equipment.armor.percent) baseDmg = Math.floor(baseDmg * (1 + gameState.equipment.armor.value / 100));
            gameState.damage = baseDmg;
        }

        function showMessage(text) {
            const msg = document.createElement('div');

            msg.textContent = text;
            document.body.appendChild(msg);

            num.style.left = x + 'px';

            gameWorld.appendChild(num);

        function screenShake() {
            if (screenShakeTimer) return;
            const container = worldScroll;
            let intensity = 8;
            let duration = 300;
            let startTime = Date.now();
            screenShakeTimer = setInterval(() => {
                const elapsed = Date.now() - startTime;
                if (elapsed >= duration) {
                    container.style.transform = '';
                    clearInterval(screenShakeTimer);
                    screenShakeTimer = null;
                    return;
                }
                const strength = intensity * (1 - elapsed / duration);
                const dx = (Math.random() - 0.5) * strength * 2;
                const dy = (Math.random() - 0.5) * strength * 2;
                container.style.transform = `translate(${dx}px, ${dy}px)`;
            }, 16);
        }

        function renderInventory() {
            const invItems = document.getElementById('inv-items');
            invItems.innerHTML = '';
            if (gameState.inventory.length === 0) {
                invItems.innerHTML = '<div style="color:#6a5a3a;text-align:center;padding:15px;">Пусто</div>';
            }
            gameState.inventory.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'inv-item';
                const isEq = (gameState.equipment.weapon && gameState.equipment.weapon.name === item.name) ||
                             (gameState.equipment.armor && gameState.equipment.armor.name === item.name);
                if (isEq) div.classList.add('equipped');
                div.innerHTML = `<span>${item.name}</span><span style="color:#8a7a4a;font-size:9px;">${item.type === 'weapon' ? '⚔️' : item.type === 'armor' ? '🛡' : '🧪'}</span>`;
                div.addEventListener('click', () => equipItem(index));
                invItems.appendChild(div);
            });
            document.getElementById('equip-weapon').textContent = 'Оружие: ' + (gameState.equipment.weapon ? gameState.equipment.weapon.name : 'нет');
            document.getElementById('equip-armor').textContent = 'Броня: ' + (gameState.equipment.armor ? gameState.equipment.armor.name : 'нет');
        }

        function equipItem(index) {
            const item = gameState.inventory[index];
            if (!item) return;
            if (item.type === 'weapon') {
                gameState.equipment.weapon = (gameState.equipment.weapon && gameState.equipment.weapon.name === item.name) ? null : item;
            } else if (item.type === 'armor') {
                gameState.equipment.armor = (gameState.equipment.armor && gameState.equipment.armor.name === item.name) ? null : item;
            } else if (item.type === 'consumable') {
                useConsumable(item, index);
                return;
            } else if (item.type === 'special') {
                // Special items handling
                if (item.stat === 'sight') {
                    gameState.hasEyeSight = true;
                    showMessage('👁 Око Предвидения активировано!');
                    gameState.inventory.splice(index, 1);
                    saveGame();
                    renderInventory();
                    return;
                }
                if (item.stat === 'revive') {
                    gameState.hasPhoenixRing = true;
                    gameState.phoenixCooldown = Date.now() + 1800000; // 30 min cooldown
                    showMessage('🔥 Кольцо Феникса экипировано!');
                    gameState.inventory.splice(index, 1);
                    saveGame();
                    renderInventory();
                    return;
                }
            }
            recalcStats();
            renderInventory();
            updateStats();
            saveGame();
        }

        function useConsumable(item, index) {
            if (item.stat === 'heal') {
                const healAmt = Math.floor(gameState.maxHp * 0.5);
                gameState.hp = Math.min(gameState.maxHp, gameState.hp + healAmt);
                showHeal(400, 300, healAmt);
                gameState.inventory.splice(index, 1);
                updateStats();
                saveGame();
                renderInventory();
                showMessage('❤️ Зелье лечения использовано!');
                return;
            }
            if (item.stat === 'explosive') {
                gameState.hasExplosive = true;
                gameState.inventory.splice(index, 1);
                saveGame();
                renderInventory();
                showMessage('💥 Взрыв-зелье получено!');
                checkLegendaryQuests();
                return;
            }
        }

        function addToInventory(item) {
            gameState.inventory.push(item);
            if (inventoryOverlay.classList.contains('visible')) renderInventory();
            saveGame();
        }

        function buyItem(item) {
            if (gameState.gold < item.price) { showMessage('Недостаточно золота!'); return; }

            if (item.type === 'consumable') {
                addToInventory({ name: item.name, type: item.type, stat: item.stat, value: item.value, desc: item.desc });
            } else {
                addToInventory({ name: item.name, type: item.type, stat: item.stat, value: item.value, percent: false, desc: item.desc });
            }
            updateStats();
            saveGame();
            showMessage(`Куплено: ${item.name}`);
            checkLegendaryQuests();
        }

        function activatePromo() {
            const code = promoInput.value.trim().toUpperCase();
            if (!code) { promoResult.textContent = 'Введите код'; return; }
            const promo = promoCodes[code];
            if (!promo) { promoResult.textContent = 'Неверный код'; return; }
            const usedKey = promo.usedKey || ('promo_' + code);
            if (localStorage.getItem(usedKey)) { promoResult.textContent = 'Код уже использован'; return; }
            localStorage.setItem(usedKey, '1');
            if (promo.gold) { gameState.gold += promo.gold; }
            if (promo.items) {
                promo.items.forEach(item => addToInventory({ ...item }));
            }
            updateStats();
            saveGame();
            promoResult.textContent = '✅ Код активирован!';
            promoInput.value = '';
            setTimeout(() => { promoOverlay.classList.remove('visible'); }, 1500);
        }

        function renderQuests() {
            questList.innerHTML = '';
            const activeQuests = gameState.quests.filter(q => q.active || q.completed);
            if (activeQuests.length === 0) {
                questList.innerHTML = '<div style="color:#6a5a3a;text-align:center;padding:15px;">Нет активных квестов</div>';
                return;
            }
            activeQuests.forEach(q => {
                const div = document.createElement('div');
                div.className = 'quest-item';
                let status = q.completed ? '✅ ЗАВЕРШЕН' : '⏳ В ПРОГРЕССЕ';
                let stepsHtml = '';
                if (!q.completed) {
                    stepsHtml = q.steps.map((s, i) => {
                        const done = s.done ? '✅' : '⬜';
                        let progress = '';
                        if (s.progress !== undefined && s.max) {
                            progress = ` (${s.progress}/${s.max})`;
                        }
                        return `<div style="font-size:9px;color:#8a7a6a;padding-left:10px;">${done} ${s.desc}${progress}</div>`;
                    }).join('');
                }
                div.innerHTML = `
                    <div class="qname">${q.name}</div>
                    <div class="qdesc" style="font-size:9px;color:#8a7a6a;">${q.desc}</div>
                    <div class="qstatus">${status}</div>
                    ${stepsHtml}
                    ${q.completed ? `<div style="color:#80ff80;font-size:10px;">🏆 Награда: ${q.reward.name}</div>` : ''}
                `;
                questList.appendChild(div);
            });
        }

        function checkLegendaryQuests() {
            // Проверка прогресса легендарных квестов
            gameState.quests.forEach(q => {
                if (q.completed || !q.active) return;
                if (gameState.level < q.levelReq) return;

                // Коса Смерти
                if (q.id === 'scythe_of_death') {
                    // Step 1: Поговорить со Старцем - проверяем при клике на NPC в подземельях
                    // Step 2: Найти Призрака в Лесу ночью - проверяем при клике на Призрака
                    // Step 3: Убить 50 мобов в Лесу
                    if (q.currentStep >= 2 && !q.steps[2].done) {
                        // Считаем убийства в лесу
                        const forestKills = q.killCount || 0;
                        if (forestKills >= 50) {
                            q.steps[2].done = true;
                            q.steps[2].progress = 50;
                            q.currentStep = 3;
                            showMessage('✅ Лес очищен! Идите к Жнецу.');
                            saveGame();
                        }
                    }
                    // Step 4: Получить ключ - автоматически после убийства Жнеца
                }

                // Щит Абсолюта
                if (q.id === 'shield_of_absolut') {
                    if (!q.steps[0].done && gameState.hasExplosive) {
                        q.steps[0].done = true;
                        q.currentStep = 1;
                        showMessage('✅ Стена разрушена! Идите к Алхимику.');
                        saveGame();
                    }
                    if (q.currentStep >= 1 && !q.steps[1].done && gameState.hasShieldHalf) {
                        q.steps[1].done = true;
                        q.currentStep = 2;
                        showMessage('✅ Половина щита найдена! Идите к Кузнецу.');
                        saveGame();
                    }
                    if (q.currentStep >= 2 && !q.steps[2].done && gameState.hasRareStone) {
                        q.steps[2].done = true;
                        q.currentStep = 3;
                        showMessage('✅ Редкий камень получен! Идите к Кузнецу.');
                        saveGame();
                    }
                    if (q.currentStep >= 3 && !q.steps[3].done && gameState.hasExplosive && gameState.hasShieldHalf && gameState.hasRareStone) {
                        // Соединение у Кузнеца - проверяем при взаимодействии
                    }
                }

                // Око Предвидения
                if (q.id === 'eye_of_foresight') {
                    if (!q.steps[0].done && gameState.hasEyeSight) {
                        q.steps[0].done = true;
                        q.currentStep = 1;
                        showMessage('✅ Старец найден! Ищите Глаз Хранителя.');
                        saveGame();
                    }
                    if (q.currentStep >= 1 && !q.steps[1].done) {
                        // Проверяем наличие глаза в инвентаре
                        const hasEye = gameState.inventory.some(i => i.name === 'Глаз Хранителя');
                        if (hasEye) {
                            q.steps[1].done = true;
                            q.currentStep = 2;
                            showMessage('✅ Глаз Хранителя получен! Следуйте за Старцем.');
                            saveGame();
                        }
                    }
                }

                // Кольцо Феникса
                if (q.id === 'ring_of_phoenix') {
                    if (!q.steps[0].done && gameState.hasPhoenixRing) {
                        q.steps[0].done = true;
                        q.currentStep = 1;
                        showMessage('✅ Пепел найден! Несите Алхимику.');
                        saveGame();
                    }
                    if (q.currentStep >= 1 && !q.steps[1].done && gameState.hasPhoenixRing) {
                        q.steps[1].done = true;
                        q.currentStep = 2;
                        showMessage('✅ Пепел у Алхимика! Добудьте Кровь Дракона.');
                        saveGame();
                    }
                    if (q.currentStep >= 2 && !q.steps[2].done) {
                        const hasBlood = gameState.inventory.some(i => i.name === 'Кровь Дракона');
                        if (hasBlood) {
                            q.steps[2].done = true;
                            q.currentStep = 3;
                            showMessage('✅ Кровь Дракона получена! Получите кольцо.');
                            saveGame();
                        }
                    }
                    if (q.currentStep >= 3 && !q.steps[3].done && gameState.hasPhoenixRing) {
                        q.steps[3].done = true;
                        q.currentStep = 4;
                        showMessage('✅ Пепельное Кольцо получено! Умрите с ним.');
                        saveGame();
                    }
                    if (q.currentStep >= 4 && !q.steps[4].done && gameState.hasRevived) {
                        q.steps[4].done = true;
                        completeLegendaryQuest(q);
                    }
                }

                // Меч Раскола
                if (q.id === 'sword_of_split') {
                    if (!q.steps[0].done && gameState.shardsFound >= 1) {
                        q.steps[0].done = true;
                        q.currentStep = 1;
                        showMessage('✅ Осколок 1 найден! Ищите остальные.');
                        saveGame();
                    }
                    if (q.currentStep >= 1 && !q.steps[1].done && gameState.shardsFound >= 2) {
                        q.steps[1].done = true;
                        q.currentStep = 2;
                        showMessage('✅ Осколок 2 найден! Ищите третий.');
                        saveGame();
                    }
                    if (q.currentStep >= 2 && !q.steps[2].done && gameState.shardsFound >= 3) {
                        q.steps[2].done = true;
                        q.currentStep = 3;
                        showMessage('✅ Все осколки собраны! Идите к Кузнецу.');
                        saveGame();
                    }
                    if (q.currentStep >= 3 && !q.steps[3].done && gameState.hasCrackedSword) {
                        q.steps[3].done = true;
                        q.currentStep = 4;
                        showMessage('✅ Треснутый Меч получен! Убейте 30 мобов.');
                        saveGame();
                    }
                    if (q.currentStep >= 4 && !q.steps[4].done) {
                        if (gameState.crackedSwordKills >= 30) {
                            q.steps[4].done = true;
                            q.steps[4].progress = 30;
                            completeLegendaryQuest(q);
                        }
                    }
                }
            });
            updateStats();
            if (questDiary.classList.contains('visible')) renderQuests();
        }

        function completeLegendaryQuest(q) {
            q.completed = true;
            q.active = false;
            // Добавляем награду в инвентарь
            if (q.reward) {
                addToInventory({ ...q.reward });
                showMessage(`🏆 Квест завершён! Получено: ${q.reward.name}`);
            }
            saveGame();
            if (questDiary.classList.contains('visible')) renderQuests();
        }

        function startQuest(qId) {
            const q = gameState.quests.find(q => q.id === qId);
            if (!q || q.active || q.completed) return;
            if (gameState.level < q.levelReq) {
                showMessage(`Требуется ${q.levelReq} уровень!`);
                return;
            }
            q.active = true;
            q.currentStep = 0;
            q.steps[0].done = false;
            showMessage(`📜 Квест начат: ${q.name}`);
            saveGame();
            if (questDiary.classList.contains('visible')) renderQuests();
        }

        // ============================================================
        // МОБЫ
        // ============================================================
        function spawnMobs(locationKey) {
            const loc = locations[locationKey];
            if (!loc || !loc.mobType) return;
            clearMobs();
            const data = mobData[loc.mobType];
            if (!data) return;
            for (let i = 0; i < loc.mobCount; i++) {
                const mob = {
                    id: 'mob_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                    type: loc.mobType,
                    x: Math.max(20, Math.min(880, loc.x + (Math.random() - 0.5) * 280)),
                    y: Math.max(40, Math.min(610, loc.y + (Math.random() - 0.5) * 180)),
                    hp: data.hp, maxHp: data.hp,
                    damage: data.damage, attackSpeed: data.attackSpeed,
                    expMin: data.expMin, expMax: data.expMax, gold: data.gold,
                    drops: data.drops, cssClass: data.cssClass || '', name: data.name,
                    alive: true, moveInterval: null, isBoss: false
                };
                mobs.push(mob);
                renderMobElement(mob);
                startMobMovement(mob, locationKey);
            }
            // Добавляем босса для подземелий
            if (locationKey === 'подземелья') {
                addBoss();
            }
        }

        function addBoss() {
            const loc = locations['подземелья'];
            if (!loc) return;
            const boss = {
                id: 'boss_' + Date.now(),
                type: 'boss',
                x: loc.x + 50,
                y: loc.y - 30,
                hp: 1500,
                maxHp: 1500,
                damage: 120,
                attackSpeed: 2500,
                expMin: 1000,
                expMax: 2000,
                gold: 50000,
                drops: [
                    { name: 'Ключ Жнеца', type: 'special', stat: 'key', value: 1, dropChance: 100, desc: 'Ключ от Жнеца' },
                    { name: 'Меч Тёмного Рыцаря', type: 'weapon', stat: 'damage', value: 120, percent: false, dropChance: 30, desc: 'Урон 120' },
                ],
                cssClass: 'dungeon-mob',
                name: '👑 Жнец (БОСС)',
                alive: true,
                moveInterval: null,
                isBoss: true
            };
            mobs.push(boss);
            renderMobElement(boss);
            startMobMovement(boss, 'подземелья');
        }

        function clearMobs() {
            mobs.forEach(m => {
                const el = document.getElementById(m.id);
                if (el) el.remove();
                if (m.moveInterval) clearInterval(m.moveInterval);
                if (mobAttackIntervals[m.id]) { clearInterval(mobAttackIntervals[m.id]); delete mobAttackIntervals[m.id]; }
            });
            mobs = [];
            if (selectedMob) { selectedMob = null; targetPanel.classList.remove('visible'); }
        }

        function renderMobElement(mob) {
            const el = document.createElement('div');
            el.className = 'mob ' + mob.cssClass;
            if (mob.isBoss) el.style.width = '40px';
            el.id = mob.id;
            el.style.left = mob.x + 'px';
            el.style.top = mob.y + 'px';
            el.textContent = mob.isBoss ? '👑' : mob.name.charAt(0);
            el.addEventListener('click', (e) => { e.stopPropagation(); selectMobFunc(mob); });
            el.addEventListener('touchend', (e) => { e.preventDefault(); selectMobFunc(mob); });
            gameWorld.appendChild(el);
        }

        function startMobMovement(mob, locationKey) {
            const loc = locations[locationKey];
            mob.moveInterval = setInterval(() => {
                if (!mob.alive) return;
                mob.x = Math.max(20, Math.min(880, loc.x + (Math.random() - 0.5) * 260));
                mob.y = Math.max(40, Math.min(610, loc.y + (Math.random() - 0.5) * 160));
                const el = document.getElementById(mob.id);
                if (el) { el.style.left = mob.x + 'px'; el.style.top = mob.y + 'px'; }
            }, 2500 + Math.random() * 2000);
        }

        function selectMobFunc(mob) {
            document.querySelectorAll('.mob.selected').forEach(el => el.classList.remove('selected'));
            selectedMob = mob;
            const el = document.getElementById(mob.id);
            if (el) el.classList.add('selected');
            targetPanel.classList.add('visible');
            document.getElementById('target-name').textContent = mob.isBoss ? '👑 ' + mob.name : mob.name;
            document.getElementById('target-hp').textContent = mob.hp + '/' + mob.maxHp;
            document.getElementById('target-dmg').textContent = mob.damage;
            document.getElementById('target-reward').textContent = mob.gold.toLocaleString() + ' зол';
        }

        function deselectMob() {
            document.querySelectorAll('.mob.selected').forEach(el => el.classList.remove('selected'));
            selectedMob = null;
            targetPanel.classList.remove('visible');
            Object.keys(mobAttackIntervals).forEach(key => {
                clearInterval(mobAttackIntervals[key]);
                delete mobAttackIntervals[key];
            });
        }

        function attackMob() {
            if (!selectedMob || !selectedMob.alive) return;
            
            // Бой с улучшениями
            let totalDamage = gameState.damage;
            let isCrit = false;
            let isMiss = false;
            let isBlocked = false;

            // Проверка промаха (5%)
            if (Math.random() < 0.05) {
                isMiss = true;
            }

            // Проверка блока (15% если есть щит)
            const hasShield = gameState.equipment.armor && gameState.equipment.armor.blockChance;
            if (!isMiss && hasShield && Math.random() < 0.15) {
                isBlocked = true;
            }

            if (isMiss) {
                showMessage('❌ Промах!');
                return;
            }

            if (isBlocked) {
                showMessage('🛡 Блок!');
                return;
            }

            // Крит (10%, х2.5)
            if (Math.random() < 0.1) {
                isCrit = true;
                totalDamage = Math.floor(totalDamage * 2.5);
            }

            // Игнорирование брони (30% если есть меч с бронепробитием)
            let armorPen = 0;
            if (gameState.equipment.weapon && gameState.equipment.weapon.armorPen) {
                armorPen = gameState.equipment.weapon.armorPen;
            }

            // Применяем урон
            selectedMob.hp -= totalDamage;
            const el = document.getElementById(selectedMob.id);
            if (el) showDamage(selectedMob.x + 10, selectedMob.y - 10, totalDamage, isCrit);
            
            // Вампиризм (8% от Косы Смерти)
            if (gameState.equipment.weapon && gameState.equipment.weapon.vampirism) {
                const vampHeal = Math.floor(totalDamage * (gameState.equipment.weapon.vampirism / 100));
                if (vampHeal > 0) {
                    gameState.hp = Math.min(gameState.maxHp, gameState.hp + vampHeal);
                    if (el) showHeal(selectedMob.x - 10, selectedMob.y - 20, vampHeal);
                }
            }

            document.getElementById('target-hp').textContent = selectedMob.hp + '/' + selectedMob.maxHp;
            
            if (selectedMob.hp <= 0) {
                killMob(selectedMob);
                return;
            }

            // Моб атакует в ответ
            if (!mobAttackIntervals[selectedMob.id]) {
                mobAttackIntervals[selectedMob.id] = setInterval(() => {
                    if (!selectedMob || !selectedMob.alive || !mobs.find(m => m.id === selectedMob?.id)) {
                        clearInterval(mobAttackIntervals[selectedMob?.id]);
                        delete mobAttackIntervals[selectedMob?.id];
                        return;
                    }
                    // Моб атакует (шанс промаха 5%)
                    if (Math.random() < 0.05) {
                        showMessage('❌ Враг промахнулся!');
                        return;
                    }
                    const mobDmg = Math.floor(selectedMob.damage * (0.9 + Math.random() * 0.2));
                    gameState.hp -= mobDmg;
                    if (gameState.hp < 0) gameState.hp = 0;
                    updateStats(); saveGame();
                    showMessage(`Враг атакует! -${mobDmg} HP`);
                    if (gameState.hp <= 0) playerDeath();
                }, selectedMob.attackSpeed);
            }
            
            // Проверка квестов
            if (selectedMob.type === 'forest' && gameState.location === 'лес') {
                const q = gameState.quests.find(q => q.id === 'scythe_of_death' && q.active && !q.completed);
                if (q && q.currentStep >= 2) {
                    q.killCount = (q.killCount || 0) + 1;
                    q.steps[2].progress = q.killCount;
                    checkLegendaryQuests();
                    saveGame();
                }
            }
            if (gameState.hasCrackedSword) {
                gameState.crackedSwordKills++;
                checkLegendaryQuests();
                saveGame();
            }
            if (!gameState.isDay) {
                gameState.nightKills = (gameState.nightKills || 0) + 1;
                checkTitles();
                saveGame();
            }

            updateStats();
            saveGame();
        }

        function killMob(mob) {
            mob.alive = false;
            if (mob.moveInterval) clearInterval(mob.moveInterval);
            if (mobAttackIntervals[mob.id]) { clearInterval(mobAttackIntervals[mob.id]); delete mobAttackIntervals[mob.id]; }
            const el = document.getElementById(mob.id); if (el) el.remove();
            
            const expGain = Math.floor(Math.random() * (mob.expMax - mob.expMin + 1)) + mob.expMin;
            gameState.exp += expGain;
            gameState.gold += mob.gold;
            gameState.totalKills++;
            gameState.totalGoldEarned += mob.gold;
            
            if (mob.isBoss) {
                gameState.bossKills++;
                showMessage(`👑 БОСС ПОБЕЖДЁН! +${mob.gold} золота`);
                // Проверка ключа для квеста
                const q = gameState.quests.find(q => q.id === 'scythe_of_death' && q.active && !q.completed);
                if (q && q.currentStep === 3) {
                    q.steps[3].done = true;
                    q.currentStep = 4;
                    showMessage('🔑 Ключ получен! Идите к Жнецу.');
                    saveGame();
                }
            } else {
                showGold(mob.x, mob.y - 20, mob.gold);
                showMessage(`Побеждён! +${expGain} опыта, +${mob.gold} золота`);
            }

            checkDrops(mob);
            if (selectedMob && selectedMob.id === mob.id) deselectMob();
            checkLevelUp();
            updateStats(); 
            saveGame();
            mobs = mobs.filter(m => m.id !== mob.id);
            
            // Проверяем достижения
            checkAchievements();
            checkTitles();
            checkLegendaryQuests();
        }

        function checkDrops(mob) {
            mob.drops.forEach(drop => {
                if (Math.random() * 100 < drop.dropChance) {
                    addToInventory({ name: drop.name, type: drop.type, stat: drop.stat, value: drop.value, percent: drop.percent || false, desc: drop.desc });
                    showMessage(`🎁 Дроп: ${drop.name}!`);
                    
                    // Проверка особых дропов
                    if (drop.name === 'Глаз Хранителя') {
                        checkLegendaryQuests();
                    }
                    if (drop.name === 'Кровь Дракона') {
                        checkLegendaryQuests();
                    }
                    if (drop.name === 'Ключ Жнеца') {
                        const q = gameState.quests.find(q => q.id === 'scythe_of_death' && q.active && !q.completed);
                        if (q && q.currentStep === 3) {
                            q.steps[3].done = true;
                            q.currentStep = 4;
                            showMessage('🔑 Ключ получен! Идите к Жнецу.');
                            saveGame();
                        }
                    }
                    if (drop.name === 'Осколок меча' || drop.name.includes('Осколок')) {
                        gameState.shardsFound = (gameState.shardsFound || 0) + 1;
                        checkLegendaryQuests();
                    }
                }
            });
            // Проверка дропа с Хранителя (5% для второй половины щита)
            if (mob.type === 'ellad' && Math.random() < 0.05) {
                gameState.hasShieldHalf = true;
                showMessage('🛡 Найдена вторая половина Щита Абсолюта!');
                checkLegendaryQuests();
                saveGame();
            }
        }

        function checkLevelUp() {
            while (gameState.exp >= gameState.expToLevel && gameState.level < gameState.maxLevel) {
                gameState.exp -= gameState.expToLevel;
                gameState.level++;
                gameState.expToLevel = Math.floor(gameState.expToLevel * 1.4);
                gameState.hp = gameState.maxHp;
                recalcStats();
                updateStats();
                saveGame();
                showMessage(`🎉 Уровень ${gameState.level}!`);
                checkAchievements();
                checkTitles();
                checkLegendaryQuests();
            }
        }

        function playerDeath() {
            gameState.totalDeaths++;
            
            // Проверка Кольца Феникса
            if (gameState.hasPhoenixRing && Date.now() > gameState.phoenixCooldown) {
                const healAmt = Math.floor(gameState.maxHp * 0.4);
                gameState.hp = healAmt;
                gameState.hasRevived = true;
                gameState.phoenixCooldown = Date.now() + 1800000; // 30 min cooldown
                showMessage('🔥 Кольцо Феникса воскресило вас! (40% ХП)');
                checkLegendaryQuests();
                updateStats();
                saveGame();
                return;
            }
            
            showMessage('💀 Вы погибли...');
            gameState.hp = Math.floor(gameState.maxHp / 2);
            gameState.gold = Math.floor(gameState.gold * 0.9);
            deselectMob();
            updateStats();
            saveGame();
            teleportTo('начальный_город');
        }

        // ============================================================
        // ПОГОДА
        // ============================================================
        function startWeatherCycle() {
            if (weatherTimer) clearTimeout(weatherTimer);
            weatherTimer = setTimeout(() => {
                const types = ['дождь', 'заражение'];
                const type = types[Math.floor(Math.random() * types.length)];
                currentWeather = type;
                if (type === 'дождь') {
                    showMessage('🌧 Дождь! Шанс дропа увеличен х3!');
                } else {
                    showMessage('☣ Заражение! Шанс дропа увеличен х3!');
                }
                // Эффект погоды
                gameWorld.style.filter = type === 'дождь' ? 'brightness(0.85) saturate(0.9)' : 'brightness(0.9) saturate(1.2)';
                
                setTimeout(() => {
                    currentWeather = null;
                    gameWorld.style.filter = '';
                    showMessage('🌤 Погода нормализовалась.');
                }, 30000);
                
                startWeatherCycle();
            }, 300000); // каждые 5 минут
        }

        // ============================================================
        // БРОДЯЧИЙ ТОРГОВЕЦ
        // ============================================================
        function startTraderCycle() {
            if (traderTimer) clearTimeout(traderTimer);
            const delay = 1800000 + Math.random() * 1800000; // 30-60 минут
            traderTimer = setTimeout(() => {
                spawnTrader();
                startTraderCycle();
            }, delay);
        }

        function spawnTrader() {
            const locKeys = Object.keys(locations);
            const randomLoc = locKeys[Math.floor(Math.random() * locKeys.length)];
            traderLocation = randomLoc;
            traderActive = true;
            
            const loc = locations[randomLoc];
            const traderEl = document.createElement('div');
            traderEl.className = 'npc';
            traderEl.style.left = (loc.x + 60) + 'px';
            traderEl.style.top = (loc.y - 40) + 'px';
            traderEl.textContent = '🧳';
            traderEl.id = 'trader';
            traderEl.title = 'Бродячий торговец';
            traderEl.addEventListener('click', () => openTraderShop());
            traderEl.addEventListener('touchend', (e) => { e.preventDefault(); openTraderShop(); });
            gameWorld.appendChild(traderEl);
            
            showMessage(`🧳 Бродячий торговец появился в ${loc.label}!`);
            
            // Убираем торговца через 5 минут
            setTimeout(() => {
                const el = document.getElementById('trader');
                if (el) el.remove();
                traderActive = false;
                showMessage('🧳 Торговец ушёл.');
            }, 300000);
        }

        function openTraderShop() {
            if (!traderActive) return;
            const items = [
                { name: 'Свиток удачи', type: 'consumable', stat: 'luck', value: 1, desc: 'Увеличивает шанс дропа', price: 15000 },
                { name: 'Мешок с лутом', type: 'consumable', stat: 'lootbag', value: 1, desc: 'Случайный предмет', price: 25000 },
                { name: 'Зелье маны', type: 'consumable', stat: 'mana', value: 50, desc: 'Восстанавливает 50 маны', price: 8000 },
            ];
            const randomItem = items[Math.floor(Math.random() * items.length)];
            if (gameState.gold < randomItem.price) {
                showMessage('Недостаточно золота для покупки!');
                return;
            }
            gameState.gold -= randomItem.price;
            addToInventory({ name: randomItem.name, type: randomItem.type, stat: randomItem.stat, value: randomItem.value, desc: randomItem.desc });
            showMessage(`🧳 Куплено: ${randomItem.name} за ${randomItem.price} золота`);
            updateStats();
            saveGame();
        }

        // ============================================================
        // ТЕЛЕПОРТАЦИЯ
        // ============================================================
        function teleportTo(locationKey) {
            clearMobs();
            gameState.location = locationKey;
            if (!gameState.visitedLocations) gameState.visitedLocations = [];
            if (!gameState.visitedLocations.includes(locationKey)) {
                gameState.visitedLocations.push(locationKey);
                checkAchievements();
            }
            spawnMobs(locationKey);
            updateStats();
            const loc = locations[locationKey];
            if (loc) {
                worldScroll.scrollTo({ left: Math.max(0, loc.x - worldScroll.clientWidth / 2), top: Math.max(0, loc.y - worldScroll.clientHeight / 2), behavior: 'smooth' });
            }
            saveGame();
            showMessage(`📍 ${locations[locationKey].label}`);
            // Проверяем наличие скрытых объектов
            spawnHiddenObjects(locationKey);
            spawnNPCs(locationKey);
        }

        // ============================================================
        // СКРЫТЫЕ ОБЪЕКТЫ
        // ============================================================
        function spawnHiddenObjects(locationKey) {
            // Удаляем старые скрытые объекты
            document.querySelectorAll('.hidden-object').forEach(el => el.remove());
            
            if (locationKey === 'пустырь') {
                // Стена
                const wall = document.createElement('div');
                wall.className = 'hidden-object';
                wall.textContent = '🧱';
                wall.style.left = (locations['пустырь'].x - 30) + 'px';
                wall.style.top = (locations['пустырь'].y + 50) + 'px';
                wall.title = 'Стена (нужно взрыв-зелье)';
                wall.addEventListener('click', () => {
                    if (gameState.hasExplosive) {
                        showMessage('💥 Стена разрушена!');
                        gameState.hasExplosive = false;
                        wall.remove();
                        // Проверка квеста
                        const q = gameState.quests.find(q => q.id === 'shield_of_absolut' && q.active && !q.completed);
                        if (q && q.currentStep === 0) {
                            q.steps[0].done = true;
                            q.currentStep = 1;
                            showMessage('✅ Стена разрушена! Идите к Алхимику.');
                            saveGame();
                            if (questDiary.classList.contains('visible')) renderQuests();
                        }
                    } else {
                        showMessage('Нужно взрыв-зелье у Алхимика!');
                    }
                });
                gameWorld.appendChild(wall);

                // Пепел
                const ash = document.createElement('div');
                ash.className = 'hidden-object';
                ash.textContent = '🪶';
                ash.style.left = (locations['пустырь'].x + 70) + 'px';
                ash.style.top = (locations['пустырь'].y - 30) + 'px';
                ash.title = 'Пепел Феникса';
                ash.addEventListener('click', () => {
                    if (!gameState.hasPhoenixRing) {
                        gameState.hasPhoenixRing = true;
                        ash.remove();
                        showMessage('🪶 Найден Пепел Феникса!');
                        // Проверка квеста
                        const q = gameState.quests.find(q => q.id === 'ring_of_phoenix' && q.active && !q.completed);
                        if (q && q.currentStep === 0) {
                            q.steps[0].done = true;
                            q.currentStep = 1;
                            showMessage('✅ Пепел найден! Несите Алхимику.');
                            saveGame();
                            if (questDiary.classList.contains('visible')) renderQuests();
                        }
                    }
                });
                gameWorld.appendChild(ash);
            }

            if (locationKey === 'пещера') {
                // Сталактит
                const stalactite = document.createElement('div');
                stalactite.className = 'hidden-object';
                stalactite.textContent = '💧';
                stalactite.style.left = (locations['пещера'].x + 40) + 'px';
                stalactite.style.top = (locations['пещера'].y - 20) + 'px';
                stalactite.title = 'Сталактит (Редкий камень)';
                stalactite.addEventListener('click', () => {
                    if (!gameState.hasRareStone) {
                        gameState.hasRareStone = true;
                        stalactite.remove();
                        showMessage('💧 Получен Редкий камень!');
                        // Проверка квеста
                        const q = gameState.quests.find(q => q.id === 'shield_of_absolut' && q.active && !q.completed);
                        if (q && q.currentStep >= 2) {
                            q.steps[2].done = true;
                            q.currentStep = 3;
                            showMessage('✅ Редкий камень получен! Идите к Кузнецу.');
                            saveGame();
                            if (questDiary.classList.contains('visible')) renderQuests();
                        }
                        // Проверка для меча раскола
                        if (gameState.shardsFound < 3) {
                            gameState.shardsFound = (gameState.shardsFound || 0) + 1;
                            checkLegendaryQuests();
                        }
                    }
                });
                gameWorld.appendChild(stalactite);
            }

            // Осколок в лесу
            if (locationKey === 'лес' && Math.random() < 0.05 && gameState.shardsFound < 3) {
                const shard = document.createElement('div');
                shard.className = 'hidden-object';
                shard.textContent = '⚔️';
                shard.style.left = (locations['лес'].x + 80 + Math.random() * 40) + 'px';
                shard.style.top = (locations['лес'].y + 60 + Math.random() * 40) + 'px';
                shard.title = 'Осколок меча';
                shard.addEventListener('click', () => {
                    if (gameState.shardsFound < 3) {
                        gameState.shardsFound = (gameState.shardsFound || 0) + 1;
                        shard.remove();
                        showMessage(`⚔️ Найден осколок меча (${gameState.shardsFound}/3)!`);
                        checkLegendaryQuests();
                        saveGame();
                    }
                });
                gameWorld.appendChild(shard);
            }
        }

        // ============================================================
        // NPC
        // ============================================================
        function spawnNPCs(locationKey) {
            document.querySelectorAll('.npc:not([id="trader"])').forEach(el => el.remove());

            // Алхимик в городе
            if (locationKey === 'начальный_город') {
                const alchemist = createNPC('🧪', 'Алхимик', 'alchemist', locations['начальный_город'].x - 60, locations['начальный_город'].y + 30);
                alchemist.addEventListener('click', () => {
                    showMessage('🧪 Алхимик: "Принесите ингредиенты, и я создам зелье!"');
                    // Проверка квеста
                    const q = gameState.quests.find(q => q.id === 'ring_of_phoenix' && q.active && !q.completed);
                    if (q && q.currentStep === 1) {
                        q.steps[1].done = true;
                        q.currentStep = 2;
                        showMessage('✅ Пепел у Алхимика! Добудьте Кровь Дракона.');
                        saveGame();
                        if (questDiary.classList.contains('visible')) renderQuests();
                    }
                });
                
                const blacksmith = createNPC('⚒️', 'Кузнец', 'blacksmith', locations['начальный_город'].x + 70, locations['начальный_город'].y - 20);
                blacksmith.addEventListener('click', () => {
                    showMessage('⚒️ Кузнец: "Принесите части, и я соединю их!"');
                    // Проверка соединения щита
                    const qShield = gameState.quests.find(q => q.id === 'shield_of_absolut' && q.active && !q.completed);
                    if (qShield && qShield.currentStep === 3 && gameState.hasShieldHalf && gameState.hasRareStone) {
                        qShield.steps[3].done = true;
                        qShield.completed = true;
                        qShield.active = false;
                        addToInventory({ ...qShield.reward });
                        showMessage(`🛡 Щит Абсолюта создан!`);
                        saveGame();
                        if (questDiary.classList.contains('visible')) renderQuests();
                    }
                    // Проверка соединения меча
                    const qSword = gameState.quests.find(q => q.id === 'sword_of_split' && q.active && !q.completed);
                    if (qSword && qSword.currentStep === 3 && gameState.shardsFound >= 3) {
                        qSword.steps[3].done = true;
                        qSword.currentStep = 4;
                        gameState.hasCrackedSword = true;
                        addToInventory({ name: 'Треснутый Меч', type: 'weapon', stat: 'damage', value: 80, percent: false, desc: 'Урон 80' });
                        showMessage('⚔️ Треснутый Меч создан! Убейте 30 мобов.');
                        saveGame();
                        if (questDiary.classList.contains('visible')) renderQuests();
                    }
                });
            }

            // Старец в подземельях
            if (locationKey === 'подземелья') {
                const elder = createNPC('👨‍🦯', 'Старец', 'elder', locations['подземелья'].x - 40, locations['подземелья'].y + 40);
                elder.addEventListener('click', () => {
                    showMessage('👨‍🦯 Старец: "Ты ищешь знания? Принеси Глаз Хранителя."');
                    // Проверка квеста
                    const q = gameState.quests.find(q => q.id === 'eye_of_foresight' && q.active && !q.completed);
                    if (q && q.currentStep === 0) {
                        q.steps[0].done = true;
                        q.currentStep = 1;
                        showMessage('✅ Старец найден! Ищите Глаз Хранителя.');
                        saveGame();
                        if (questDiary.classList.contains('visible')) renderQuests();
                    }
                    // Для квеста Коса Смерти
                    const qScythe = gameState.quests.find(q => q.id === 'scythe_of_death' && q.active && !q.completed);
                    if (qScythe && qScythe.currentStep === 0) {
                        qScythe.steps[0].done = true;
                        qScythe.currentStep = 1;
                        showMessage('✅ Старец указал путь! Ищите Призрака в Лесу ночью.');
                        saveGame();
                        if (questDiary.classList.contains('visible')) renderQuests();
                    }
                });
            }

            // Леди Вуаль на пустыре
            if (locationKey === 'пустырь') {
                const lady = createNPC('🧙‍♀️', 'Леди Вуаль', 'lady', locations['пустырь'].x + 50, locations['пустырь'].y + 40);
                lady.addEventListener('click', () => {
                    showMessage('🧙‍♀️ Леди Вуаль: "Третий осколок у меня... но сначала докажи свою силу."');
                    // Проверка для меча раскола
                    if (gameState.shardsFound < 3) {
                        gameState.shardsFound = (gameState.shardsFound || 0) + 1;
                        showMessage(`⚔️ Получен осколок от Леди Вуаль (${gameState.shardsFound}/3)!`);
                        checkLegendaryQuests();
                        saveGame();
                    }
                });
            }

            // Призрак в лесу (только ночью)
            if (locationKey === 'лес' && !gameState.isDay) {
                const ghost = createNPC('👻', 'Призрак', 'ghost', locations['лес'].x - 50, locations['лес'].y - 30);
                ghost.addEventListener('click', () => {
                    showMessage('👻 Призрак: "Ты ищешь Косу Смерти? Она у Жнеца в подземельях."');
                    // Проверка квеста
                    const q = gameState.quests.find(q => q.id === 'scythe_of_death' && q.active && !q.completed);
                    if (q && q.currentStep === 1) {
                        q.steps[1].done = true;
                        q.currentStep = 2;
                        showMessage('✅ Призрак найден! Убейте 50 мобов в Лесу.');
                        saveGame();
                        if (questDiary.classList.contains('visible')) renderQuests();
                    }
                });
            }
        }

        function createNPC(emoji, name, className, x, y) {
            const el = document.createElement('div');
            el.className = `npc ${className}`;
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.textContent = emoji;
            el.title = name;
            el.id = `npc_${className}`;
            gameWorld.appendChild(el);
            return el;
        }

        // ============================================================
        // ДЕНЬ/НОЧЬ
        // ============================================================
        function startDayNightCycle() {
            if (!gameState.isDay) gameWorld.classList.add('night');
            if (dayTimer) clearTimeout(dayTimer);
            dayTimer = setTimeout(() => {
                gameState.isDay = false;
                gameWorld.classList.add('night');
                saveGame();
                showMessage('🌙 Наступила ночь... Призрак появится в Лесу!');
                // Обновляем NPC
                if (gameState.location === 'лес') {
                    spawnNPCs('лес');
                }
                dayTimer = setTimeout(() => {
                    gameState.isDay = true;
                    gameWorld.classList.remove('night');
                    saveGame();
                    showMessage('☀️ Наступил день!');
                    // Удаляем призрака
                    document.querySelectorAll('.npc.ghost').forEach(el => el.remove());
                    startDayNightCycle();
                }, 160000);
            }, gameState.isDay ? 160000 : 10000);
        }

        // ============================================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================================
        function initGame() {
            locations = randomLocations();
            const loaded = loadGame();
            if (!loaded) {
                gameState.gold = 10000;
                gameState.damage = 4;
                gameState.level = 1;
                gameState.maxLevel = 225;
                gameState.hp = 100;
                gameState.maxHp = 100;
                gameState.exp = 0;
                gameState.expToLevel = 400;
                gameState.location = 'начальный_город';
                gameState.inventory = [];
                gameState.equipment = { weapon: null, armor: null };
                gameState.isDay = true;
                gameState.totalKills = 0;
                gameState.totalDeaths = 0;
                gameState.totalGoldEarned = 0;
                gameState.bossKills = 0;
                gameState.startDate = new Date().toISOString();
                gameState.visitedLocations = [];
                gameState.nightKills = 0;
                gameState.achievements = [];
                gameState.titles = [];
                gameState.quests = JSON.parse(JSON.stringify(legendaryQuests));
                gameState.hasExplosive = false;
                gameState.hasShieldHalf = false;
                gameState.hasRareStone = false;
                gameState.hasPhoenixRing = false;
                gameState.phoenixCooldown = 0;
                gameState.hasCrackedSword = false;
                gameState.crackedSwordKills = 0;
                gameState.shardsFound = 0;
                gameState.hasEyeSight = false;
                saveGame();
            }
            recalcStats();
            updateStats();
            renderTeleportPoints();
            spawnMobs(gameState.location);
            spawnHiddenObjects(gameState.location);
            spawnNPCs(gameState.location);
            if (!gameState.isDay) gameWorld.classList.add('night');
            startDayNightCycle();
            startWeatherCycle();
            startTraderCycle();
            
            // Добавляем кнопки для старта легендарных квестов (только если активны)
            setTimeout(() => {
                // Если есть доступные квесты, показываем подсказку
                const availableQuests = gameState.quests.filter(q => !q.active && !q.completed && gameState.level >= q.levelReq);
                if (availableQuests.length > 0) {
                    showMessage('📜 Доступны легендарные квесты! Нажмите Q для просмотра.');
                }
            }, 3000);

            const loc = locations[gameState.location];
            if (loc) setTimeout(() => worldScroll.scrollTo({ left: Math.max(0, loc.x - worldScroll.clientWidth / 2), top: Math.max(0, loc.y - worldScroll.clientHeight / 2) }), 300);
            showMessage(loaded ? '📂 Прогресс загружен!' : '🆕 Новая игра!');
        }

        function renderTeleportPoints() {
            Object.entries(locations).forEach(([key, loc]) => {
                const tp = document.createElement('div');
                tp.className = 'teleport-point';
                tp.style.left = loc.x + 'px';
                tp.style.top = loc.y + 'px';
                tp.textContent = '↗';
                tp.addEventListener('click', (e) => { e.stopPropagation(); teleportTo(key); });
                tp.addEventListener('touchend', (e) => { e.preventDefault(); teleportTo(key); });
                gameWorld.appendChild(tp);
                const label = document.createElement('div');
                label.className = 'location-label';
                label.style.left = (loc.x - 25) + 'px';
                label.style.top = (loc.y + 36) + 'px';
                label.textContent = loc.label;
                gameWorld.appendChild(label);
            });
        }

        // ============================================================
        // СОБЫТИЯ
        // ============================================================
        document.getElementById('btn-inventory').addEventListener('click', toggleInventory);
        document.getElementById('btn-shop').addEventListener('click', toggleShop);
        document.getElementById('btn-save').addEventListener('click', () => { saveGame(); showMessage('💾 Сохранено!'); });
        document.getElementById('btn-promo').addEventListener('click', togglePromo);
        document.getElementById('btn-quests').addEventListener('click', toggleQuests);
        document.getElementById('btn-bio').addEventListener('click', toggleBio);
        document.getElementById('shop-close').addEventListener('click', () => shopOverlay.classList.remove('visible'));
        document.getElementById('promo-close').addEventListener('click', () => promoOverlay.classList.remove('visible'));
        document.getElementById('quest-close').addEventListener('click', () => questDiary.classList.remove('visible'));
        document.getElementById('bio-close').addEventListener('click', () => bioOverlay.classList.remove('visible'));
        document.getElementById('btn-attack').addEventListener('click', attackMob);
        document.getElementById('btn-cancel-target').addEventListener('click', deselectMob);
        document.getElementById('promo-submit').addEventListener('click', activatePromo);
        promoInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') activatePromo(); });

        document.querySelectorAll('.shop-tabs button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.shop-tabs button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderShop(btn.dataset.tab);
            });
        });

        gameWorld.addEventListener('click', (e) => {
            if (e.target === gameWorld || e.target.classList.contains('location-label')) deselectMob();
        });

        worldScroll.addEventListener('scroll', () => {
            const hint = document.querySelector('.swipe-hint');
            if (hint) hint.style.opacity = '0';
        }, { once: true });

        setInterval(() => saveGame(), 5000);
        window.addEventListener('beforeunload', () => saveGame());
        window.addEventListener('pagehide', () => saveGame());
        document.addEventListener('visibilitychange', () => { if (document.hidden) saveGame(); });

        // Добавляем старт квестов в консоль для удобства тестирования
        window.startQuest = startQuest;

        initGame();
    </script>
</body>
</html>
