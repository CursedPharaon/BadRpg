        .shop-card .buy-btn { background: #8b2020; color: #ffdddd; border: 1px solid #5a1010; padding: 3px; cursor: pointer; font-family: inherit; font-weight: bold; font-size: 9px; width: 100%; margin-top: 3px; }
        .shop-card .identify-btn { background: #4a3a6a; color: #ddddff; border: 1px solid #3a2a5a; padding: 3px; cursor: pointer; font-family: inherit; font-weight: bold; font-size: 9px; width: 100%; margin-top: 3px; }
        .quest-log { position: fixed; right: 4px; bottom: 16px; width: 180px; max-height: 130px; background: rgba(10,5,0,0.9); border: 2px solid #4a3a1a; z-index: 280; padding: 5px; font-size: 8px; color: #c0a060; overflow-y: auto; display: none; }
        .quest-log.visible { display: block; }
        .bio-log { position: fixed; left: 4px; bottom: 16px; width: 180px; max-height: 130px; background: rgba(10,5,0,0.9); border: 2px solid #4a3a1a; z-index: 280; padding: 5px; font-size: 8px; color: #c0a060; overflow-y: auto; display: none; }

        #btn-inventory { top: 38px; } #btn-shop { top: 72px; } #btn-save { top: 106px; font-size: 10px; } #btn-promo { top: 140px; } #btn-quests { top: 174px; } #btn-bio { top: 208px; }
        .floating-msg { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.92); color: #e0c040; padding: 8px 16px; border: 2px solid #6a5a2a; z-index: 400; font-size: 12px; pointer-events: none; animation: fadeUp 2s forwards; }

<body>

        <div class="shop-bg"><div class="shop-tabs"><button class="active" data-tab="weapons">⚔️ Оружие</button><button data-tab="armor">🛡 Броня</button></div><div class="shop-cards" id="shop-cards"></div></div>

        <input type="text" id="promo-input" placeholder="КОД">

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
        const supabase = createClient('https://tmjqafqecjpizawdruzq.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRtanFhZnFlY2pwaXphd2RydXpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4OTk2OTYsImV4cCI6MjA5NTQ3NTY5Nn0.8K7i5QEbjYWSvqw78P8RSR_abYM8uCRZbvC9Hp12bac');

        // ID игрока (сохраняется в localStorage)
        const PLAYER_ID = localStorage.getItem('dr_player_id') || crypto.randomUUID();
        localStorage.setItem('dr_player_id', PLAYER_ID);

        // Глобальное состояние
        let player = null;
        let inventory = [];
        let equipment = { weapon: null, armor: null };
        let quests = {};
        let bio = {};
        let locs = {};
        let mobsData = {};
        let shopData = { weapons: [], armor: [] };
        let legendariesData = {};
        let promosData = {};
        let wanderingData = [];
        let currentLocation = 'начальный_город';
        let mobs = [];
        let selectedMob = null;
        let mobAttackIntervals = {};
        let dayTimer = null;

        // ============================================================
        // ЗАГРУЗКА ДАННЫХ ИЗ БД
        // ============================================================
        async function loadAllData() {
            // Локации
            const { data: locsD } = await supabase.from('locs').select('*');
            locs = {};
            locsD.forEach(l => { locs[l.key] = { x: 100 + Math.random() * 700, y: 50 + Math.random() * 550, label: l.label, mob_type: l.mob_type, mob_count: l.mob_count }; });

            // Мобы
            const { data: mobsD } = await supabase.from('mobs').select('*');
            mobsData = {};
            mobsD.forEach(m => { mobsData[m.key] = { ...m, drops: [] }; });

            // Дроп
            const { data: dropsD } = await supabase.from('drops').select('*');
            dropsD.forEach(d => { if (mobsData[d.mob_key]) mobsData[d.mob_key].drops.push(d); });

            // Магазин
            const { data: shopD } = await supabase.from('shop').select('*');
            shopData = { weapons: [], armor: [] };
            shopD.forEach(s => { if (s.category === 'weapons') shopData.weapons.push(s); else shopData.armor.push(s); });

            // Легендарки
            const { data: legD } = await supabase.from('legendaries').select('*');
            legendariesData = {};
            legD.forEach(l => { legendariesData[l.key] = l; });

            // Промокоды
            const { data: promosD } = await supabase.from('promos').select('*');
            promosData = {};
            promosD.forEach(p => { promosData[p.code] = p; });

            // Товары торговца
            const { data: wandD } = await supabase.from('wandering').select('*');
            wanderingData = wandD || [];
        }

        // ============================================================
        // ЗАГРУЗКА ИГРОКА
        // ============================================================
        async function loadPlayer() {
            const { data } = await supabase.from('players').select('*').eq('id', PLAYER_ID).single();
            if (data) {
                player = data;
                currentLocation = data.location;
                // Инвентарь
                const { data: inv } = await supabase.from('inventory').select('*').eq('player_id', PLAYER_ID);
                inventory = inv || [];
                // Экипировка
                const { data: eq } = await supabase.from('equipment').select('*').eq('player_id', PLAYER_ID).single();
                equipment = eq ? { weapon: eq.weapon, armor: eq.armor } : { weapon: null, armor: null };
                // Квесты
                const { data: q } = await supabase.from('quests').select('*').eq('player_id', PLAYER_ID);
                quests = {};
                q.forEach(x => { quests[x.quest_key] = x; });
                // Био
                const { data: b } = await supabase.from('bio').select('*').eq('player_id', PLAYER_ID).single();
                bio = b || { total_kills: 0, total_deaths: 0, favorite: 'начальный_город', strongest: '', days: 0 };
            } else {
                // Новый игрок
                player = { id: PLAYER_ID, gold: 10000, damage: 4, level: 1, hp: 100, max_hp: 100, exp: 0, exp_to_level: 400, location: 'начальный_город', is_day: true, title: '', kills: 0, deaths: 0, total_kills: 0 };
                await supabase.from('players').insert(player);
                await supabase.from('equipment').insert({ player_id: PLAYER_ID, weapon: null, armor: null });
                await supabase.from('bio').insert({ player_id: PLAYER_ID });
                inventory = [];
                equipment = { weapon: null, armor: null };
                quests = {};
                bio = { total_kills: 0, total_deaths: 0, favorite: 'начальный_город', strongest: '', days: 0 };
            }
        }

        async function savePlayer() {
            player.location = currentLocation;
            await supabase.from('players').upsert(player);
        }

        async function saveInventory() {
            await supabase.from('inventory').delete().eq('player_id', PLAYER_ID);
            if (inventory.length > 0) {
                const items = inventory.map(i => ({ ...i, player_id: PLAYER_ID }));
                await supabase.from('inventory').insert(items);
            }
        }

        async function saveEquipment() {
            await supabase.from('equipment').upsert({ player_id: PLAYER_ID, weapon: equipment.weapon, armor: equipment.armor });
        }

        async function saveQuests() {
            await supabase.from('quests').delete().eq('player_id', PLAYER_ID);
            const arr = Object.values(quests).map(q => ({ ...q, player_id: PLAYER_ID }));
            if (arr.length > 0) await supabase.from('quests').insert(arr);
        }

        async function saveBio() {
            await supabase.from('bio').upsert({ player_id: PLAYER_ID, ...bio });
        }

        async function saveAll() {
            await savePlayer();
            await saveInventory();
            await saveEquipment();
            await saveQuests();
            await saveBio();
        }

        // Инициализация
        await loadAllData();
        await loadPlayer();

        console.log('✅ Dark Relics загружена. Игрок:', PLAYER_ID);
        console.log('Локации:', Object.keys(locs));
        console.log('Мобы:', Object.keys(mobsData));
        // ============================================================
        // ОТРИСОВКА КАРТЫ
        // ============================================================
        function renderTeleportPoints() {
            Object.entries(locs).forEach(([key, loc]) => {
                const tp = document.createElement('div');
                tp.className = 'teleport-point';
                tp.style.left = loc.x + 'px';
                tp.style.top = loc.y + 'px';
                tp.textContent = '↗';
                tp.addEventListener('click', (e) => { e.stopPropagation(); teleportTo(key); });
                tp.addEventListener('touchend', (e) => { e.preventDefault(); teleportTo(key); });
                gameWorld.appendChild(tp);
                const lb = document.createElement('div');
                lb.className = 'location-label';
                lb.style.left = (loc.x - 25) + 'px';
                lb.style.top = (loc.y + 36) + 'px';
                lb.textContent = loc.label;
                gameWorld.appendChild(lb);
            });
        }

        // ============================================================
        // МОБЫ
        // ============================================================
        function spawnMobs(locationKey) {
            const loc = locs[locationKey];
            if (!loc || !loc.mob_type) return;
            clearMobs();
            const data = mobsData[loc.mob_type];
            if (!data) return;
            for (let i = 0; i < loc.mob_count; i++) {
                const mob = {
                    id: 'mob_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                    type: loc.mob_type,
                    x: Math.max(20, Math.min(880, loc.x + (Math.random() - 0.5) * 280)),
                    y: Math.max(40, Math.min(610, loc.y + (Math.random() - 0.5) * 180)),
                    hp: data.hp, maxHp: data.hp,
                    damage: data.damage, attackSpeed: data.speed,
                    expMin: data.exp_min, expMax: data.exp_max, gold: data.gold,
                    drops: data.drops, cssClass: data.css || '', name: data.name,
                    alive: true, moveInterval: null
                };
                mobs.push(mob);
                renderMobElement(mob);
                startMobMovement(mob, locationKey);
            }
        }

        function clearMobs() {
            mobs.forEach(m => {
                const el = document.getElementById(m.id);
                if (el) el.remove();
                if (m.moveInterval) clearInterval(m.moveInterval);
                if (mobAttackIntervals[m.id]) { clearInterval(mobAttackIntervals[m.id]); delete mobAttackIntervals[m.id]; }
            });
            mobs = [];
            if (selectedMob) { selectedMob = null; targetPanel.classList.remove('visible'); }
        }

        function renderMobElement(mob) {
            const el = document.createElement('div');
            el.className = 'mob ' + mob.cssClass;
            el.id = mob.id;
            el.style.left = mob.x + 'px';
            el.style.top = mob.y + 'px';
            el.textContent = mob.name.charAt(0);
            el.addEventListener('click', (e) => { e.stopPropagation(); selectMobFunc(mob); });
            el.addEventListener('touchend', (e) => { e.preventDefault(); selectMobFunc(mob); });
            gameWorld.appendChild(el);
        }

        function startMobMovement(mob, locationKey) {
            const loc = locs[locationKey];
            mob.moveInterval = setInterval(() => {
                if (!mob.alive) return;
                mob.x = Math.max(20, Math.min(880, loc.x + (Math.random() - 0.5) * 260));
                mob.y = Math.max(40, Math.min(610, loc.y + (Math.random() - 0.5) * 160));
                const el = document.getElementById(mob.id);
                if (el) { el.style.left = mob.x + 'px'; el.style.top = mob.y + 'px'; }
            }, 2500 + Math.random() * 2000);
        }

        function selectMobFunc(mob) {
            document.querySelectorAll('.mob.selected').forEach(el => el.classList.remove('selected'));
            selectedMob = mob;
            const el = document.getElementById(mob.id);
            if (el) el.classList.add('selected');
            targetPanel.classList.add('visible');
            document.getElementById('target-name').textContent = mob.name;
            document.getElementById('target-hp').textContent = mob.hp + '/' + mob.maxHp;
        }

        function deselectMob() {
            document.querySelectorAll('.mob.selected').forEach(el => el.classList.remove('selected'));
            selectedMob = null;
            targetPanel.classList.remove('visible');
            Object.keys(mobAttackIntervals).forEach(key => {
                clearInterval(mobAttackIntervals[key]);
                delete mobAttackIntervals[key];
            });
        }

        function attackMob() {
            if (!selectedMob || !selectedMob.alive) return;
            selectedMob.hp -= player.damage;
            document.getElementById('target-hp').textContent = selectedMob.hp + '/' + selectedMob.maxHp;
            if (selectedMob.hp <= 0) { killMob(selectedMob); return; }
            if (!mobAttackIntervals[selectedMob.id]) {
                mobAttackIntervals[selectedMob.id] = setInterval(() => {
                    if (!selectedMob || !selectedMob.alive || !mobs.find(m => m.id === selectedMob?.id)) {
                        clearInterval(mobAttackIntervals[selectedMob?.id]);
                        delete mobAttackIntervals[selectedMob?.id];
                        return;
                    }
                    player.hp -= selectedMob.damage;
                    if (player.hp < 0) player.hp = 0;
                    updateStats();
                    saveAll();
                    if (player.hp <= 0) playerDeath();
                }, selectedMob.attackSpeed);
            }
        }

        function killMob(mob) {
            mob.alive = false;
            if (mob.moveInterval) clearInterval(mob.moveInterval);
            if (mobAttackIntervals[mob.id]) { clearInterval(mobAttackIntervals[mob.id]); delete mobAttackIntervals[mob.id]; }
            const el = document.getElementById(mob.id); if (el) el.remove();
            player.exp += Math.floor(Math.random() * (mob.expMax - mob.expMin + 1)) + mob.expMin;
            player.gold += mob.gold;
            player.kills++;
            player.total_kills++;
            bio.total_kills++;
            checkDrops(mob);
            if (equipment.weapon === 'Треснутый Меч') {
                player.extra_rift = (player.extra_rift || 0) + 1;
                if (player.extra_rift >= 30) completeStep('riftblade', 'rift_5');
            }
            if (quests.scythe && quests.scythe.active && currentLocation === 'лес') {
                quests.scythe.extra = quests.scythe.extra || {};
                quests.scythe.extra.kills = (quests.scythe.extra.kills || 0) + 1;
                if (quests.scythe.extra.kills >= 50) completeStep('scythe', 'scythe_3');
            }
            if (selectedMob && selectedMob.id === mob.id) deselectMob();
            checkLevelUp();
            updateStats();
            saveAll();
            mobs = mobs.filter(m => m.id !== mob.id);
        }

        function checkDrops(mob) {
            mob.drops.forEach(d => {
                if (Math.random() * 100 < d.chance) {
                    addToInventory({ name: d.name, type: d.type, stat: d.stat, value: d.value, percent: d.percent, legendary: false, unidentified: (Math.random() < 0.3), item_desc: '' });
                    showMessage(`🎁 ${d.name}!`);
                }
            });
            // Спец-дропы для легендарок
            if (mob.type === 'ellad' && Math.random() * 100 < 5) {
                if (quests.shield && quests.shield.active && !quests.shield.steps[3]?.done) {
                    addToInventory({ name: 'Половина щита', type: 'quest', stat: 'none', value: 0, percent: false, legendary: false, unidentified: false, item_desc: 'Для Щита' });
                    completeStep('shield', 'shield_4');
                }
                if (quests.eye && quests.eye.active && !quests.eye.steps[1]?.done) {
                    addToInventory({ name: 'Глаз Хранителя', type: 'quest', stat: 'none', value: 0, percent: false, legendary: false, unidentified: false, item_desc: 'Для Ока' });
                    completeStep('eye', 'eye_2');
                }
                if (quests.phoenix && quests.phoenix.active && !quests.phoenix.steps[2]?.done) {
                    addToInventory({ name: 'Кровь Дракона', type: 'quest', stat: 'none', value: 0, percent: false, legendary: false, unidentified: false, item_desc: 'Для Кольца' });
                    completeStep('phoenix', 'phoenix_3');
                }
            }
            if (mob.type === 'forest' && Math.random() * 100 < 5 && quests.riftblade && quests.riftblade.active && !quests.riftblade.steps[0]?.done) {
                addToInventory({ name: 'Осколок 1', type: 'quest', stat: 'none', value: 0, percent: false, legendary: false, unidentified: false, item_desc: 'Для Меча' });
                completeStep('riftblade', 'rift_1');
            }
        }

        function checkLevelUp() {
            while (player.exp >= player.exp_to_level && player.level < 225) {
                player.exp -= player.exp_to_level;
                player.level++;
                player.exp_to_level = Math.floor(player.exp_to_level * 1.4);
                player.hp = player.max_hp;
                recalcStats();
                updateStats();
                saveAll();
                showMessage(`🎉 Уровень ${player.level}!`);
                if (player.level >= 40 && !quests.scythe) startQuest('scythe');
                checkTitles();
            }
        }

        function playerDeath() {
            const phoenixRing = inventory.find(i => i.name === 'Кольцо Феникса' && i.active);
            if (phoenixRing && currentLocation !== 'начальный_город') {
                player.hp = Math.floor(player.max_hp * 0.4);
                showMessage('🔥 Кольцо Феникса воскресило вас!');
                updateStats();
                saveAll();
                return;
            }
            showMessage('💀 Вы погибли...');
            player.hp = Math.floor(player.max_hp / 2);
            player.gold = Math.floor(player.gold * 0.9);
            player.deaths++;
            bio.total_deaths++;
            deselectMob();
            updateStats();
            saveAll();
            if (quests.scythe && quests.scythe.active) quests.scythe.extra.kills = 0;
            teleportTo('начальный_город');
        }

        function recalcStats() {
            let bHp = 100 + (player.level - 1) * 30;
            if (equipment.armor) {
                const arm = inventory.find(i => i.name === equipment.armor);
                if (arm) {
                    if (arm.percent) bHp = Math.floor(bHp * (1 + arm.value / 100));
                    else bHp += arm.value;
                }
            }
            player.max_hp = bHp;
            if (player.hp > player.max_hp) player.hp = player.max_hp;
            let bDmg = 4 + (player.level - 1) * 3;
            if (equipment.weapon) {
                const wep = inventory.find(i => i.name === equipment.weapon);
                if (wep) bDmg += wep.value;
            }
            player.damage = bDmg;
        }

        // ============================================================
        // ТЕЛЕПОРТАЦИЯ
        // ============================================================
        function teleportTo(locationKey) {
            clearMobs();
            currentLocation = locationKey;
            spawnMobs(locationKey);
            updateStats();
            const loc = locs[locationKey];
            if (loc) worldScroll.scrollTo({ left: Math.max(0, loc.x - worldScroll.clientWidth / 2), top: Math.max(0, loc.y - worldScroll.clientHeight / 2), behavior: 'smooth' });
            if (bio.favorite !== locationKey && player.kills > bio.total_kills * 0.3) bio.favorite = locationKey;
            saveAll();
            showMessage(`📍 ${loc.label}`);
        }

        // ============================================================
        // ИНВЕНТАРЬ
        // ============================================================
        function addToInventory(item) {
            inventory.push(item);
            saveAll();
        }

        function hasItem(name) { return inventory.some(i => i.name === name); }

        function equipItem(index) {
            const item = inventory[index];
            if (!item) return;
            if (item.type === 'weapon') {
                equipment.weapon = (equipment.weapon === item.name) ? null : item.name;
            } else if (item.type === 'armor') {
                equipment.armor = (equipment.armor === item.name) ? null : item.name;
            } else if (item.name === 'Кольцо Феникса') {
                item.active = !item.active;
            }
            recalcStats();
            updateStats();
            saveAll();
        }

        function identifyItem(index) {
            const item = inventory[index];
            if (!item || !item.unidentified) return;
            item.unidentified = false;
            // Случайный бафф или дебафф
            const roll = Math.random();
            if (roll < 0.3) { item.value = Math.floor(item.value * 1.5);
                item.legendary = true;
                item.item_desc = '✨ Легендарный!'; } else if (roll < 0.6) { item.value = Math.floor(item.value * 0.7);
                item.item_desc = 'Проклятый...'; } else { item.item_desc = 'Обычный предмет.'; }
            saveAll();
            showMessage(`🔍 ${item.name} опознан!`);
        }

        // ============================================================
        // МАГАЗИН
        // ============================================================
        function buyShopItem(item) {
            if (player.gold < item.price) { showMessage('Недостаточно золота!'); return; }
            player.gold -= item.price;
            addToInventory({ name: item.name, type: item.type, stat: item.stat, value: item.value, percent: false, legendary: false, unidentified: false, item_desc: item.description || '' });
            updateStats();
            saveAll();
            showMessage(`Куплено: ${item.name}`);
        }

        function buyWanderingItem(item) {
            if (player.gold < item.price) { showMessage('Недостаточно золота!'); return; }
            player.gold -= item.price;
            if (item.name === 'Мешок с лутом') {
                const roll = Math.random();
                if (roll < 0.005) addToInventory({ name: 'Легендарный самоцвет', type: 'special', stat: 'none', value: 0, percent: false, legendary: true, unidentified: false, item_desc: 'Джекпот!' });
                else if (roll < 0.1) addToInventory({ name: 'Редкий меч', type: 'weapon', stat: 'damage', value: 100, percent: false, legendary: false, unidentified: false, item_desc: 'Из мешка' });
                else addToInventory({ name: 'Обычный меч', type: 'weapon', stat: 'damage', value: 20, percent: false, legendary: false, unidentified: false, item_desc: 'Из мешка' });
            } else {
                addToInventory({ name: item.name, type: item.type, stat: item.stat, value: item.value, percent: false, legendary: false, unidentified: false, item_desc: item.description || '' });
            }
            updateStats();
            saveAll();
            showMessage(`Куплено: ${item.name}`);
        }

        // ============================================================
        // ПРОМОКОДЫ
        // ============================================================
        async function activatePromo() {
            const code = document.getElementById('promo-input').value.trim().toUpperCase();
            if (!code) return;
            const promo = promosData[code];
            if (!promo) { document.getElementById('promo-result').textContent = 'Неверный код'; return; }
            const usedKey = 'promo_' + code;
            if (localStorage.getItem(usedKey)) { document.getElementById('promo-result').textContent = 'Код использован'; return; }
            localStorage.setItem(usedKey, '1');
            if (promo.gold) player.gold += promo.gold;
            if (promo.items && promo.items.length > 0) {
                promo.items.forEach(i => addToInventory({ ...i, unidentified: false, legendary: false }));
            }
            if (promo.uses > 0) { promo.uses--; await supabase.from('promos').update({ uses: promo.uses }).eq('code', code); if (promo.uses <= 0) delete promosData[code]; }
            updateStats();
            saveAll();
            document.getElementById('promo-result').textContent = '✅ Активирован!';
            setTimeout(() => document.getElementById('promo-overlay').classList.remove('visible'), 1500);
        }

        // ============================================================
        // ТИТУЛЫ
        // ============================================================
        function checkTitles() {
            if (player.total_kills >= 1000 && !player.title.includes('Убийца 1000')) player.title = '🥇 Убийца 1000';
            else if (player.total_kills >= 500 && !player.title.includes('Охотник')) player.title = '🎯 Охотник';
            else if (player.total_kills >= 100 && !player.title.includes('Воин')) player.title = '⚔️ Воин';
            if (player.deaths === 0 && player.level >= 50 && !player.title.includes('Бессмертный')) player.title = '💫 Бессмертный';
            if (player.gold <= 0 && player.level >= 10 && !player.title.includes('Нищий')) player.title = '🪙 Нищий';
            document.getElementById('title-display').textContent = player.title;
        }

        // ============================================================
        // КВЕСТЫ
        // ============================================================
        function startQuest(qk) {
            if (quests[qk]) return;
            const leg = legendariesData[qk];
            if (!leg) return;
            quests[qk] = { quest_key: qk, quest_name: leg.name, active: true, completed: false, steps: JSON.parse(JSON.stringify(leg.steps)), extra: {} };
            showMessage(`📜 Квест: ${leg.name}!`);
            saveAll();
        }

        function completeStep(qk, sid) {
            const q = quests[qk];
            if (!q || !q.active || q.completed) return;
            const step = q.steps.find(s => s.id === sid);
            if (step && !step.done) {
                step.done = true;
                showMessage(`✅ ${step.text}`);
                saveAll();
                checkQuestCompletion(qk);
            }
        }

        function checkQuestCompletion(qk) {
            const q = quests[qk];
            if (!q || !q.active || q.completed) return;
            if (q.steps.every(s => s.done)) {
                q.completed = true;
                q.active = false;
                const leg = legendariesData[qk];
                if (leg.reward_type === 'weapon' || leg.reward_type === 'armor')
                    addToInventory({ name: leg.reward_name, type: leg.reward_type, stat: leg.reward_type === 'weapon' ? 'damage' : 'hp', value: leg.reward_value, percent: false, legendary: true, unidentified: false, item_desc: leg.reward_desc });
                else if (leg.reward_type === 'special')
                    addToInventory({ name: leg.reward_name, type: 'special', stat: 'none', value: 0, percent: false, legendary: true, unidentified: false, item_desc: leg.reward_desc });
                showMessage(`🎉 ${q.quest_name} завершён!`);
                saveAll();
            }
        }

        // ============================================================
        // БРОДЯЧИЙ ТОРГОВЕЦ
        // ============================================================
        let wanderingTimer = null;
        let wanderingNpc = null;

        function spawnWanderingMerchant() {
            if (wanderingNpc) wanderingNpc.remove();
            const locKeys = Object.keys(locs).filter(k => k !== currentLocation);
            const randomLoc = locs[locKeys[Math.floor(Math.random() * locKeys.length)]];
            const npc = document.createElement('div');
            npc.className = 'npc wandering-merchant';
            npc.textContent = '🎪';
            npc.style.left = (randomLoc.x + 30) + 'px';
            npc.style.top = (randomLoc.y - 20) + 'px';
            npc.addEventListener('click', (e) => { e.stopPropagation(); showWanderingShop(); });
            gameWorld.appendChild(npc);
            wanderingNpc = npc;
            showMessage('🎪 Бродячий торговец появился!');
            setTimeout(() => { if (wanderingNpc) { wanderingNpc.remove();
                    wanderingNpc = null; } }, 600000);
        }

        function showWanderingShop() {
            shopCards.innerHTML = '';
            wanderingData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'shop-card';
                card.innerHTML = `<div class="card-name">${item.name}</div><div>💰 ${item.price}</div><button class="buy-btn">КУПИТЬ</button>`;
                card.querySelector('.buy-btn').addEventListener('click', () => buyWanderingItem(item));
                shopCards.appendChild(card);
            });
            shopOverlay.classList.add('visible');
        }

        // ============================================================
        // ПОГОДА
        // ============================================================
        let weatherInterval = null;

        function startWeatherSystem() {
            weatherInterval = setInterval(() => {
                const roll = Math.random();
                const world = document.getElementById('game-world');
                world.classList.remove('rain', 'infected');
                if (roll < 0.2) {
                    world.classList.add('rain');
                    showWeatherIndicator('🌧 Дождь! Мобы медленнее, но их больше.');
                } else if (roll < 0.3) {
                    world.classList.add('infected');
                    document.querySelectorAll('.mob').forEach(m => m.classList.add('infected'));
                    showWeatherIndicator('☠ Заражение! Мобы сильнее, дроп х3!');
                    setTimeout(() => {
                        world.classList.remove('infected');
                        document.querySelectorAll('.mob').forEach(m => m.classList.remove('infected'));
                    }, 600000);
                }
            }, 300000);
        }

        function showWeatherIndicator(text) {
            const el = document.createElement('div');
            el.className = 'weather-indicator';
            el.textContent = text;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 4000);
        }

        // ============================================================
        // ИНИЦИАЛИЗАЦИЯ
        // ============================================================
        function updateStats() {
            document.getElementById('stat-level').textContent = player.level;
            document.getElementById('stat-hp').textContent = `${player.hp}/${player.max_hp}`;
            document.getElementById('stat-exp').textContent = `${player.exp}/${player.exp_to_level}`;
            document.getElementById('stat-gold').textContent = player.gold.toLocaleString();
            document.getElementById('stat-dmg').textContent = player.damage;
            document.getElementById('hp-fill').style.width = (player.hp / player.max_hp * 100) + '%';
            document.getElementById('exp-fill').style.width = (player.exp / player.exp_to_level * 100) + '%';
            document.getElementById('location-indicator').textContent = locs[currentLocation]?.label || '';
            document.getElementById('title-display').textContent = player.title || '';
        }

        function showMessage(text) {
            const m = document.createElement('div');
            m.className = 'floating-msg';
            m.textContent = text;
            document.body.appendChild(m);
            setTimeout(() => m.remove(), 2000);
        }

        function renderAllNPCs() {
            const city = locs['начальный_город'];
            // Алхимик
            addNPC('🧪', city.x - 55, city.y - 30, () => {
                if (quests.shield && quests.shield.active && !quests.shield.steps.find(s => s.id === 'shield_2').done && player.gold >= 30000) {
                    player.gold -= 30000;
                    completeStep('shield', 'shield_2');
                    showMessage('🧪 Куплено взрыв-зелье!');
                    updateStats();
                    saveAll();
                }
                if (quests.phoenix && quests.phoenix.active && !quests.phoenix.steps.find(s => s.id === 'phoenix_2').done && hasItem('Пепел')) {
                    completeStep('phoenix', 'phoenix_2');
                }
                if (quests.phoenix && quests.phoenix.active && !quests.phoenix.steps.find(s => s.id === 'phoenix_4').done && hasItem('Кровь Дракона')) {
                    completeStep('phoenix', 'phoenix_4');
                    addToInventory({ name: 'Пепельное Кольцо', type: 'special', stat: 'none', value: 0, percent: false, legendary: false, unidentified: false, item_desc: 'Умереть с ним для активации', active: false });
                }
            });
            // Кузнец
            addNPC('⚒️', city.x + 55, city.y - 30, () => {
                if (quests.shield && quests.shield.active && quests.shield.steps.find(s => s.id === 'shield_4').done && hasItem('Половина щита')) {
                    completeStep('shield', 'shield_5');
                }
                if (quests.riftblade && quests.riftblade.active && ['rift_1', 'rift_2', 'rift_3'].every(id => quests.riftblade.steps.find(s => s.id === id).done) && !quests.riftblade.steps.find(s => s.id === 'rift_4').done) {
                    completeStep('riftblade', 'rift_4');
                    addToInventory({ name: 'Треснутый Меч', type: 'weapon', stat: 'damage', value: 40, percent: false, legendary: false, unidentified: false, item_desc: 'Убейте 30 мобов им' });
                }
            });
            // Старец в Подземельях
            const dung = locs['подземелья'];
            addNPC('👨‍🦯', dung.x + 50, dung.y - 20, () => {
                if (!quests.eye) startQuest('eye');
                if (quests.eye && quests.eye.active && !quests.eye.steps.find(s => s.id === 'eye_1').done) completeStep('eye', 'eye_1');
                if (quests.eye && quests.eye.active && quests.eye.steps.find(s => s.id === 'eye_2').done && !quests.eye.steps.find(s => s.id === 'eye_3').done) completeStep('eye', 'eye_3');
            });
            // Леди Вуаль
            const field = locs['пустырь'];
            addNPC('🧙‍♀️', field.x - 50, field.y + 40, () => {
                if (quests.riftblade && quests.riftblade.active && !quests.riftblade.steps.find(s => s.id === 'rift_3').done) {
                    completeStep('riftblade', 'rift_3');
                    addToInventory({ name: 'Осколок 3', type: 'quest', stat: 'none', value: 0, percent: false, legendary: false, unidentified: false, item_desc: 'Для Меча' });
                }
            });
            // Призрак в Лесу (ночью)
            if (!player.is_day && quests.scythe && quests.scythe.active) {
                const forest = locs['лес'];
                addNPC('👻', forest.x - 30, forest.y + 30, () => {
                    if (!quests.scythe.steps.find(s => s.id === 'scythe_2').done) completeStep('scythe', 'scythe_2');
                    if (quests.scythe.steps.find(s => s.id === 'scythe_3').done && !quests.scythe.steps.find(s => s.id === 'scythe_4').done) completeStep('scythe', 'scythe_4');
                });
            }
            // Скрытые объекты
            addHiddenObject('🧱', field.x - 60, field.y - 20, () => {
                if (!quests.shield) startQuest('shield');
                if (quests.shield && quests.shield.active && !quests.shield.steps.find(s => s.id === 'shield_1').done) completeStep('shield', 'shield_1');
                if (quests.shield && quests.shield.active && quests.shield.steps.find(s => s.id === 'shield_2').done && !quests.shield.steps.find(s => s.id === 'shield_3').done) {
                    completeStep('shield', 'shield_3');
                    addToInventory({ name: 'Половина щита', type: 'quest', stat: 'none', value: 0, percent: false, legendary: false, unidentified: false, item_desc: 'Для Щита' });
                }
            });
            const cave = locs['пещера'];
            addHiddenObject('💧', cave.x + 50, cave.y + 30, () => {

        attackMob = function() {
            if (!selectedMob || !selectedMob.alive) return;
            let dmg = player.damage;
            let isCrit = Math.random() < 0.1;
            if (isCrit) dmg = Math.floor(dmg * 2.5);
            if (Math.random() < 0.05) { showMessage('Промах!'); return; }
            selectedMob.hp -= dmg;
            const el = document.getElementById(selectedMob.id);
            if (el) {
                if (isCrit) { criticalHitEffect(selectedMob.x, selectedMob.y);
                    screenShake(); }
                showDamageNumber(selectedMob.x + 10, selectedMob.y - 10, dmg);
            }
            document.getElementById('target-hp').textContent = Math.max(0, selectedMob.hp) + '/' + selectedMob.maxHp;
            if (selectedMob.hp <= 0) { killMob(selectedMob); return; }
            if (!mobAttackIntervals[selectedMob.id]) {
                mobAttackIntervals[selectedMob.id] = setInterval(() => {
                    if (!selectedMob || !selectedMob.alive || !mobs.find(m => m.id === selectedMob?.id)) {
                        clearInterval(mobAttackIntervals[selectedMob?.id]);
                        delete mobAttackIntervals[selectedMob?.id];
                        return;
                    }
                    const hasShield = equipment.armor && inventory.find(i => i.name === equipment.armor && i.legendary);
                    if (hasShield && Math.random() < 0.15) { showMessage('🛡 Заблокировано!'); return; }
                    player.hp -= selectedMob.damage;
                    if (player.hp < 0) player.hp = 0;
                    updateStats();
                    saveAll();
                    if (player.hp <= 0) playerDeath();
                }, selectedMob.attackSpeed);
            }
        };

        killMob = function(mob) {
            mob.alive = false;
            if (mob.moveInterval) clearInterval(mob.moveInterval);
            if (mobAttackIntervals[mob.id]) { clearInterval(mobAttackIntervals[mob.id]); delete mobAttackIntervals[mob.id]; }
            const el = document.getElementById(mob.id);
            if (el) { el.style.transition = 'all 0.3s ease';
                el.style.transform = 'scale(0)';
                el.style.opacity = '0';
                setTimeout(() => el.remove(), 300); }
            showGoldDrop(mob.x, mob.y + 15, mob.gold);
            if (equipment.weapon === 'Коса Смерти') {
                const heal = Math.floor(player.max_hp * 0.08);
                player.hp = Math.min(player.max_hp, player.hp + heal);
                showHealNumber(mob.x, mob.y - 20, heal);
            }
            const expGain = Math.floor(Math.random() * (mob.expMax - mob.expMin + 1)) + mob.expMin;
            player.exp += expGain;
            player.gold += mob.gold;
            player.kills++;
            player.total_kills++;
            bio.total_kills++;
            if (mob.maxHp > (bio.strongest_hp || 0)) { bio.strongest = mob.name;
                bio.strongest_hp = mob.maxHp; }
            checkDrops(mob);
            if (equipment.weapon === 'Треснутый Меч') { player.rift_kills = (player.rift_kills || 0) + 1; if (player.rift_kills >= 30) completeStep('riftblade', 'rift_5'); }

            if (selectedMob && selectedMob.id === mob.id) deselectMob();
            checkLevelUp();
            updateStats();
            saveAll();

        };

        });

        gameWorld.addEventListener('click', (e) => { if (e.target === gameWorld) deselectMob(); });
        worldScroll.addEventListener('scroll', () => { const hint = document.querySelector('.swipe-hint'); if (hint) hint.style.opacity = '0'; }, { once: true });

        // Автосохранение
        setInterval(() => saveAll(), 5000);
        window.addEventListener('beforeunload', () => saveAll());
        window.addEventListener('pagehide', () => saveAll());
        document.addEventListener('visibilitychange', () => { if (document.hidden) saveAll(); });

        // Запуск
        initGame();
        console.log('✅ Dark Relics полностью загружена!');
    </script>
</body>
</html>
